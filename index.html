<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今天吃什么？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .wheel-container {
      position: relative;
      width: min(90vw, 420px);
      height: min(90vw, 420px);
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }

    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 36px solid #ff4757;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
      z-index: 10;
    }

    .pointer::after {
      content: '';
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      background: #ff4757;
      border-radius: 50%;
    }

    #spinBtn {
      margin-top: 30px;
      padding: 14px 48px;
      font-size: 1.3rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      background: #fff;
      color: #764ba2;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      transition: all 0.2s;
    }

    #spinBtn:hover { transform: scale(1.05); }
    #spinBtn:active { transform: scale(0.97); }
    #spinBtn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    #result {
      margin-top: 20px;
      font-size: 1.5rem;
      font-weight: 700;
      min-height: 2rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      text-align: center;
    }

    .edit-area {
      margin-top: 24px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px;
      width: min(90vw, 420px);
    }

    .edit-area summary {
      cursor: pointer;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      resize: vertical;
      background: rgba(255,255,255,0.9);
      color: #333;
    }

    .edit-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .edit-row button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-apply { background: #2ed573; color: #fff; }
    .btn-reset { background: #ff6b81; color: #fff; }
  </style>
</head>
<body>
  <h1>🎰 今天吃什么？</h1>

  <div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel" width="840" height="840"></canvas>
  </div>

  <button id="spinBtn">转 一 下</button>
  <div id="result"></div>

  <details class="edit-area">
    <summary>✏️ 自定义选项（每行一个）</summary>
    <textarea id="customItems">火锅
烧烤
麻辣烫
沙县小吃
兰州拉面
麦当劳
肯德基
披萨
日料
黄焖鸡
螺蛳粉
盖浇饭</textarea>
    <div class="edit-row">
      <button class="btn-apply" onclick="applyCustom()">应用</button>
      <button class="btn-reset" onclick="resetDefault()">恢复默认</button>
    </div>
  </details>

  <script>
    const defaultItems = [
      '火锅','烧烤','麻辣烫','沙县小吃','兰州拉面','麦当劳',
      '肯德基','披萨','日料','黄焖鸡','螺蛳粉','盖浇饭'
    ];

    const colors = [
      '#ff6b6b','#ffa502','#ffda79','#2ed573','#1e90ff','#a55eea',
      '#ff6b81','#7bed9f','#70a1ff','#eccc68','#ff7979','#badc58',
      '#f9ca24','#6ab04c','#eb4d4b','#686de0'
    ];

    let items = [...defaultItems];
    let currentRotation = 0;
    let spinning = false;

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const resultEl = document.getElementById('result');

    function drawWheel() {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const r = cx - 10;
      const arc = (2 * Math.PI) / items.length;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      items.forEach((item, i) => {
        const angle = i * arc;
        // slice
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, angle, angle + arc);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.stroke();

        // text
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle + arc / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 32px sans-serif';
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 4;
        ctx.fillText(item, r - 30, 10);
        ctx.restore();
      });

      // center circle
      ctx.beginPath();
      ctx.arc(cx, cy, 30, 0, 2 * Math.PI);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      resultEl.textContent = '';

      const extraSpins = 5 + Math.floor(Math.random() * 5); // 5-9 full spins
      const randomAngle = Math.random() * 360;
      const totalDegrees = extraSpins * 360 + randomAngle;
      currentRotation += totalDegrees;

      canvas.style.transform = `rotate(-${currentRotation}deg)`;

      const duration = 4000;
      setTimeout(() => {
        spinning = false;
        spinBtn.disabled = false;

        // Calculate winner: pointer is at top (270° or -90° in canvas coords)
        const actualAngle = currentRotation % 360;
        const sliceAngle = 360 / items.length;
        // The pointer is at the top, which corresponds to angle 0 in the rotated frame
        // but we need to account for the rotation direction
        const winnerIndex = Math.floor(((360 - actualAngle + 90) % 360) / sliceAngle) % items.length;
        // Fix: pointer at top means we need to map correctly
        const correctedIndex = Math.floor(((actualAngle + 90) % 360) / sliceAngle);
        const winner = items[(items.length - 1 - Math.floor(((currentRotation % 360) ) / sliceAngle) + items.length) % items.length];

        // Simpler calculation
        const norm = (currentRotation % 360 + 360) % 360;
        const pointerAngle = (360 - norm + 270) % 360;
        const idx = Math.floor(pointerAngle / sliceAngle) % items.length;

        resultEl.textContent = `🎉 今天吃：${items[idx]}！`;
      }, duration + 100);
    }

    spinBtn.addEventListener('click', spin);

    function applyCustom() {
      const text = document.getElementById('customItems').value.trim();
      const newItems = text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
      if (newItems.length < 2) {
        alert('至少需要 2 个选项！');
        return;
      }
      items = newItems;
      currentRotation = 0;
      canvas.style.transition = 'none';
      canvas.style.transform = 'rotate(0deg)';
      requestAnimationFrame(() => {
        canvas.style.transition = '';
      });
      drawWheel();
      resultEl.textContent = '';
    }

    function resetDefault() {
      document.getElementById('customItems').value = defaultItems.join('\n');
      items = [...defaultItems];
      currentRotation = 0;
      canvas.style.transition = 'none';
      canvas.style.transform = 'rotate(0deg)';
      requestAnimationFrame(() => {
        canvas.style.transition = '';
      });
      drawWheel();
      resultEl.textContent = '';
    }

    // Initial draw
    drawWheel();
  </script>
</body>
</html>
